<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="format-detection" content="telephone=no">
<title>المخزن</title>

<style>
body{
    font-family:'Cairo', sans-serif;
    direction:rtl;
    background:#f2f2f2;
    margin:0;
}

/* ===== HEADER ===== */
.header{
    background:rgb(197, 236, 220);
    padding:20px;
    border-bottom:3px solid #fcfcfc;
    text-align:center;
}

.logo img{
    width:120px;
    height:auto;
}

.phone{
    font-size:32px;
    font-weight:bold;
    margin-top:10px;
}

/* ===== CONTAINER ===== */
.container{
    width:90%;
    margin:20px auto;
}

/* ===== TABS ===== */
.tabs{
    text-align:center;
    margin-bottom:20px;
}

.tab{
    padding:10px 15px;
    margin:5px;
    border:none;
    cursor:pointer;
    background:#ccc;
}

.active{
    background:#0b5d3b;
    color:white;
}

/* ===== GRID ===== */
.grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(250px,1fr));
    gap:20px;
}

/* ===== CARD ===== */
.card{
    background:rgb(11, 93, 59);
    padding:40px 20px;
    border-radius:15px;
    box-shadow:0 0 15px rgb(248, 248, 248);
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

/* ===== NAME ===== */
.name{
    font-size:26px;
    font-weight:bold;
    color:#f1f6f4;
}
</style>
</head>

<body>

<!-- ===== HEADER ===== -->
<div class="header">
    <div class="logo">
        <img src="logo.jpeg" alt="logo">
    </div>

    <!-- خليه link عشان ينفع اتصال -->
    <a id="storePhone" class="phone"></a>
</div>

<div class="container">

<!-- ===== TABS ===== -->
<div class="tabs" id="tabs"></div>

<!-- ===== PRODUCTS ===== -->
<div class="grid" id="products"></div>

</div>

<!-- ===== Firebase ===== -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 بيانات Firebase */
const firebaseConfig = {
    apiKey: "AIzaSyAkIp0t7NVAkS6m9v39734r6-XHQUHtVgM",
    authDomain: "minamiladdistrubute.firebaseapp.com",
    projectId: "minamiladdistrubute",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* =====================
   بيانات السوبر ماركت
===================== */

let storeData = JSON.parse(localStorage.getItem("storeData")) || {
    phone:"01273819198"
};

let phone = String(storeData.phone);
let phoneElement = document.getElementById("storePhone");

// عرض الرقم بشكل صحيح
phoneElement.textContent = phone;

// يخليه قابل للاتصال
phoneElement.href = "tel:" + phone;

/* =====================
   المنتجات
===================== */

let allProducts = [];
let currentCategory = "";

/* تحميل المنتجات */
async function loadProducts(){

    const querySnapshot = await getDocs(collection(db, "products"));

    allProducts = [];

    querySnapshot.forEach(doc => {

        let data = doc.data();

        let product = {
            name: data.name || "بدون اسم",
            category: data.category || "منتجات"
        };

        allProducts.push(product);
    });

    renderTabs();
    renderProducts();
}

loadProducts();

/* =====================
   التبويبات
===================== */

function renderTabs(){

    let tabs = document.getElementById("tabs");
    tabs.innerHTML = "";

    let categories = [...new Set(allProducts.map(p => p.category))];

    if(!currentCategory && categories.length > 0){
        currentCategory = categories[0];
    }

    categories.forEach(cat => {

        tabs.innerHTML += `
        <button class="tab ${cat===currentCategory ? 'active' : ''}"
        onclick="selectCategory('${cat}')">${cat}</button>
        `;
    });
}

/* اختيار تبويب */
window.selectCategory = function(cat){
    currentCategory = cat;
    renderTabs();
    renderProducts();
}

/* =====================
   عرض المنتجات
===================== */

function renderProducts(){

    let container = document.getElementById("products");
    container.innerHTML = "";

    let filtered = allProducts.filter(p => 
        p.category === currentCategory && p.name
    );

    filtered.forEach(p => {

        container.innerHTML += `
        <div class="card">
            <div class="name">${p.name}</div>
        </div>
        `;
    });
}

</script>

</body>
</html>
